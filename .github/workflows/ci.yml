name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Neovim
        env:
          NEOVIM_VERSION: v0.11.4
        run: |
          curl -fsSL \
            "https://github.com/neovim/neovim/releases/download/${NEOVIM_VERSION}/nvim-linux-x86_64.tar.gz" \
            -o "$RUNNER_TEMP/nvim.tar.gz"
          sudo rm -rf /opt/nvim-linux-x86_64
          sudo tar -C /opt -xzf "$RUNNER_TEMP/nvim.tar.gz"
          echo "/opt/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Fetch mini.nvim
        run: git clone --branch "v0.17.0" --depth 1 https://github.com/echasnovski/mini.nvim "${GITHUB_WORKSPACE}/.ci/mini.nvim"

      - name: Run tests
        env:
          MINI_PATH: ${{ github.workspace }}/.ci/mini.nvim
        run: make test

  lint:
    uses: matt-riley/matt-riley-ci/.github/workflows/nvim-lint.yml@0b59f15c4f9b796fc54dcc6ee9ca0ce84292e4a8 # main

  format:
    uses: matt-riley/matt-riley-ci/.github/workflows/nvim-format.yml@0b59f15c4f9b796fc54dcc6ee9ca0ce84292e4a8 # main
